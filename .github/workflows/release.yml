name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            goos: linux
            goarch: amd64
          - os: linux
            arch: arm64
            goos: linux
            goarch: arm64
          - os: darwin
            arch: amd64
            goos: darwin
            goarch: amd64
          - os: darwin
            arch: arm64
            goos: darwin
            goarch: arm64
          - os: windows
            arch: amd64
            goos: windows
            goarch: amd64
          - os: windows
            arch: arm64
            goos: windows
            goarch: arm64
          - os: freebsd
            arch: amd64
            goos: freebsd
            goarch: amd64
          - os: freebsd
            arch: arm64
            goos: freebsd
            goarch: arm64

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build Binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        # Create output directory
        mkdir -p dist

        # Set binary name
        BINARY_NAME="weather-${{ matrix.os }}-${{ matrix.arch }}"
        if [ "${{ matrix.goos }}" = "windows" ]; then
          BINARY_NAME="${BINARY_NAME}.exe"
        fi

        # Build static binary
        go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o "dist/${BINARY_NAME}" main.go

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: weather-${{ matrix.os }}-${{ matrix.arch }}
        path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare Release Assets
      run: |
        mkdir -p release
        find artifacts -type f -name "weather-*" -exec cp {} release/ \;
        ls -lh release/

    - name: Delete Existing Release (if exists)
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete ${{ github.ref_name }} --yes || true
        git push origin :refs/tags/${{ github.ref_name }} || true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        name: Console Weather Service ${{ github.ref_name }}
        body: |
          ## 🌤️ Console Weather Service Release ${{ github.ref_name }}

          ### 🚀 Quick Start

          #### Download Binary
          ```bash
          # Linux AMD64
          wget https://github.com/apimgr/weather/releases/download/${{ github.ref_name }}/weather-linux-amd64
          chmod +x weather-linux-amd64
          PORT=3000 ./weather-linux-amd64

          # macOS ARM64 (Apple Silicon)
          wget https://github.com/apimgr/weather/releases/download/${{ github.ref_name }}/weather-darwin-arm64
          chmod +x weather-darwin-arm64
          PORT=3000 ./weather-darwin-arm64
          ```

          #### Docker
          ```bash
          docker run -d -p 3000:3000 ghcr.io/apimgr/weather:${{ github.ref_name }}
          ```

          ### ✨ What's New

          - ✅ **Complete Go rewrite** - 10x faster startup, 50% less memory
          - ✅ **State abbreviations fixed** - GPS coordinates show correct states (e.g., "Summerville, SC")
          - ✅ **Fast initialization** - Database loads in ~3 seconds (209K+ cities)
          - ✅ **Auto-ready detection** - Loading page redirects automatically when ready
          - ✅ **Detailed timing logs** - Track initialization performance
          - ✅ **Perfect wttr.in compatibility** - All format parameters (0-4)
          - ✅ **Reverse geocoding** - GPS coordinates to location names
          - ✅ **Enhanced locations** - 247 countries, 209K+ cities

          ### 📦 Available Binaries

          | Platform | Architecture | Binary |
          |----------|--------------|--------|
          | Linux | AMD64 | `weather-linux-amd64` |
          | Linux | ARM64 | `weather-linux-arm64` |
          | macOS | AMD64 (Intel) | `weather-darwin-amd64` |
          | macOS | ARM64 (Apple Silicon) | `weather-darwin-arm64` |
          | Windows | AMD64 | `weather-windows-amd64.exe` |
          | Windows | ARM64 | `weather-windows-arm64.exe` |
          | FreeBSD | AMD64 | `weather-freebsd-amd64` |
          | FreeBSD | ARM64 | `weather-freebsd-arm64` |

          ### 🌍 Features

          - **No API Key Required** - Uses free Open-Meteo API
          - **Beautiful ASCII Art** - Dracula-themed weather displays
          - **Smart Location Detection** - City names, GPS coordinates, IP geolocation
          - **Web & Console Interface** - Automatic detection based on User-Agent
          - **Production Ready** - Health checks, logging, security headers
          - **Single Binary** - No dependencies, just download and run

          ### 📖 Documentation

          - [README](https://github.com/apimgr/weather/blob/main/README_GO.md) - Complete documentation
          - [API Docs](http://wthr.top/api/docs) - Interactive API documentation
          - [Live Demo](http://wthr.top) - Try it now

          ### 🔧 Usage

          ```bash
          # Terminal weather
          curl wthr.top/London
          curl wthr.top/Tokyo?format=3
          curl wthr.top/33.0285,-80.1551?format=3

          # JSON API
          curl wthr.top/api/v1/weather?location=Paris
          curl wthr.top/api/v1/forecast?location=London
          ```

          ### 🐛 Bug Fixes

          - Fixed state abbreviation display (GPS coordinates now show "SC" instead of "US")
          - Added Nominatim reverse geocoding fallback
          - Improved coordinate-based city matching
          - Auto-notification when databases finish loading

          ### ⚡ Performance

          - Startup time: **<1 second**
          - Database loading: **~3 seconds** (247 countries + 209K cities)
          - Memory usage: **~50MB**
          - Binary size: **~20MB**
        draft: false
        prerelease: false
        files: release/*
