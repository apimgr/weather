<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Weather</title>
    <link rel="stylesheet" href="/static/css/dracula.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔔</text></svg>">
    <style>
        .notifications-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .notification-item {
            background: var(--dracula-current-line);
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 1rem 0;
            border-left: 4px solid var(--dracula-cyan);
            transition: all 0.2s;
        }

        .notification-item.unread {
            border-left-color: var(--dracula-green);
            background: rgba(80, 250, 123, 0.1);
        }

        .notification-item:hover {
            transform: translateX(5px);
        }

        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .notification-title {
            color: var(--dracula-cyan);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .notification-time {
            color: var(--dracula-comment);
            font-size: 0.875rem;
        }

        .notification-message {
            color: var(--dracula-foreground);
            line-height: 1.6;
        }

        .notification-actions {
            margin-top: 0.75rem;
            display: flex;
            gap: 0.5rem;
        }

        .notification-btn {
            background: var(--dracula-bg);
            border: 1px solid var(--dracula-pink);
            color: var(--dracula-pink);
            padding: 0.375rem 0.75rem;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .notification-btn:hover {
            background: var(--dracula-pink);
            color: var(--dracula-bg);
        }

        .notification-btn.delete {
            border-color: var(--dracula-red);
            color: var(--dracula-red);
        }

        .notification-btn.delete:hover {
            background: var(--dracula-red);
            color: var(--dracula-bg);
        }

        .notification-type {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 0.5rem;
        }

        .notification-type.alert {
            background: rgba(255, 85, 85, 0.2);
            color: var(--dracula-red);
        }

        .notification-type.info {
            background: rgba(139, 233, 253, 0.2);
            color: var(--dracula-cyan);
        }

        .notification-type.success {
            background: rgba(80, 250, 123, 0.2);
            color: var(--dracula-green);
        }

        .notification-type.warning {
            background: rgba(241, 250, 140, 0.2);
            color: var(--dracula-yellow);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--dracula-comment);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .filter-tabs {
            display: flex;
            gap: 0.5rem;
        }

        .filter-tab {
            padding: 0.5rem 1rem;
            background: var(--dracula-current-line);
            border: none;
            border-radius: 0.375rem;
            color: var(--dracula-foreground);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tab.active {
            background: var(--dracula-pink);
            color: var(--dracula-bg);
        }
    </style>
</head>
<body>
    <div class="weather-container">
        <div class="weather-header">
            🔔 Notifications
            <div style="float: right; font-size: 0.9rem;">
                <a href="/dashboard" style="color: var(--dracula-cyan); text-decoration: none; margin-right: 1rem;">📊 Dashboard</a>
                {{if .IsAdmin}}
                <a href="/admin" style="color: var(--dracula-pink); text-decoration: none; margin-right: 1rem;">⚙️ Admin</a>
                {{end}}
                <a href="/logout" style="color: var(--dracula-red); text-decoration: none;">🚪 Logout</a>
            </div>
        </div>

        <div class="notifications-container">
            <div class="top-actions">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">All</button>
                    <button class="filter-tab" data-filter="unread">Unread</button>
                </div>

                <button id="mark-all-read" class="notification-btn">
                    ✅ Mark All as Read
                </button>
            </div>

            <div id="notifications-list">
                <!-- Notifications loaded via JavaScript -->
            </div>
        </div>
    </div>

    <script>
        let currentFilter = 'all';

        // Load notifications
        async function loadNotifications() {
            const unreadParam = currentFilter === 'unread' ? '?unread=true' : '';
            const response = await fetch(`/api/notifications${unreadParam}`);
            const data = await response.json();

            const container = document.getElementById('notifications-list');

            if (data.notifications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>No notifications</h3>
                        <p>You're all caught up!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = data.notifications.map(n => {
                const time = new Date(n.created_at).toLocaleString();
                const typeClass = n.type || 'info';
                const unreadClass = n.read ? '' : 'unread';

                return `
                    <div class="notification-item ${unreadClass}" data-id="${n.id}">
                        <div class="notification-header">
                            <div>
                                <span class="notification-title">${n.title}</span>
                                <span class="notification-type ${typeClass}">${n.type}</span>
                            </div>
                            <span class="notification-time">${time}</span>
                        </div>
                        <div class="notification-message">${n.message}</div>
                        <div class="notification-actions">
                            ${!n.read ? `<button class="notification-btn" onclick="markAsRead(${n.id})">✓ Mark as Read</button>` : ''}
                            ${n.link ? `<a href="${n.link}" class="notification-btn">View</a>` : ''}
                            <button class="notification-btn delete" onclick="deleteNotification(${n.id})">🗑️ Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Mark notification as read
        async function markAsRead(id) {
            await fetch(`/api/notifications/${id}/read`, { method: 'PUT' });
            loadNotifications();
        }

        // Delete notification
        async function deleteNotification(id) {
            if (!confirm('Delete this notification?')) return;
            await fetch(`/api/notifications/${id}`, { method: 'DELETE' });
            loadNotifications();
        }

        // Mark all as read
        document.getElementById('mark-all-read').addEventListener('click', async () => {
            await fetch('/api/notifications/read-all', { method: 'PUT' });
            loadNotifications();
        });

        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                loadNotifications();
            });
        });

        // Initial load
        loadNotifications();

        // Refresh every 30 seconds
        setInterval(loadNotifications, 30000);
    </script>
</body>
</html>
