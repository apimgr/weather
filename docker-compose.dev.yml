name: weather-dev
# Development mode with hot reload
  weather-dev:
    image: golang:1.21-alpine
    container_name: weather-dev
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3001:80"
    environment:
      - PORT=80
      - GIN_MODE=debug
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
    command: >
      sh -c "apk add --no-cache git && go mod download && go run main.go"

volumes:
  go-mod-cache:

