# Production configuration
name: weather
services:
  app:
    image: casjaysdevdocker/weather:latest
    container_name: weather-app
    restart: always
    pull_policy: always
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - weather

networks:
  weather:
    driver: bridge
    external: false
