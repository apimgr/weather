services:
  weather:
    image: ghcr.io/apimgr/weather:latest
    container_name: weather
    restart: unless-stopped

    ports:
      - "64000:3000"

    environment:
      - PORT=3000
      - GIN_MODE=release
      - SESSION_SECRET=${SESSION_SECRET:-}
      - TZ=${TZ:-UTC}

    volumes:
      - ./rootfs/data/weather:/data
      - ./rootfs/config/weather:/config

    networks:
      - weather

    healthcheck:
      test: ["/usr/local/bin/weather", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  weather:
    driver: bridge
