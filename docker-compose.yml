# NO version field
# NO build definition
services:
  weather:
    image: ghcr.io/apimgr/weather:latest
    container_name: weather
    restart: unless-stopped
    environment:
      - DB_TYPE=sqlite  # First run only
    volumes:
      - ./rootfs/data/weather:/data
      - ./rootfs/config/weather:/config
    ports:
      # Development (random port 64000-64999)
      - "127.0.0.1:64080:80"
      # Production (uncomment)
      # - "172.17.0.1:64080:80"
    networks:
      - weather

networks:
  weather:
    name: weather
    driver: bridge
    external: false
