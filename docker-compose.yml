
name: weather
services:
  app:
    image: ghcr.io/apimgr/weather:latest
    container_name: weather
    restart: unless-stopped
    ports:
      - "127.0.0.1:64000:80"
    environment:
      - PORT=80
      - GIN_MODE=release
      - SESSION_SECRET=${SESSION_SECRET:-}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./rootfs/data:/data
      - ./rootfs/config:/config
    networks:
      - weather
    healthcheck:
      test: ["/usr/local/bin/weather", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  weather:
    name: weather
    driver: bridge
    external: false
